name: Refresh v1.0.2 Windows Installer

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/refresh-v102-windows.yml"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out fixed v1.0.2 source
        uses: actions/checkout@v4
        with:
          ref: v1.0.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python packaging dependencies
        run: python -m pip install --upgrade pyinstaller

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows per-user installer
        working-directory: desktop
        run: npm run tauri:build

      - name: Copy release asset
        shell: pwsh
        run: |
          $installer = Get-ChildItem "desktop/src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer was produced."
          }
          Copy-Item $installer.FullName "VisionEval-Editor-v1.0.2-windows-x64-user.exe"

      - name: Upload installer to v1.0.2 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v1.0.2" "VisionEval-Editor-v1.0.2-windows-x64-user.exe" --clobber
