name: Build Windows Per-User Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to build from and upload to"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python packaging dependencies
        run: python -m pip install --upgrade pyinstaller

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows per-user installer
        working-directory: desktop
        run: npm run tauri:build

      - name: Copy release asset
        shell: pwsh
        run: |
          $installer = Get-ChildItem "desktop/src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer was produced."
          }
          Copy-Item $installer.FullName "VisionEval-Editor-${{ inputs.release_tag }}-windows-x64-user.exe"

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" "VisionEval-Editor-${{ inputs.release_tag }}-windows-x64-user.exe" --clobber
