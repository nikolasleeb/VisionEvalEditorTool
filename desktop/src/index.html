<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VisionEval Editor</title>
    <style>
      :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f4f7fb; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
      main { width: min(680px, calc(100vw - 48px)); background: white; border: 1px solid #d7e0ec; border-radius: 10px; padding: 28px; box-shadow: 0 18px 45px rgba(20, 35, 60, 0.12); }
      main[hidden] { display: none; }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { color: #5a687c; line-height: 1.45; }
      button { appearance: none; border: 1px solid #1769e8; background: #2474ed; color: white; font-weight: 700; border-radius: 7px; padding: 11px 16px; cursor: pointer; }
      button.secondary { background: white; color: #1769e8; }
      #status { margin-top: 18px; font-weight: 700; color: #31415a; }
      .actions { display: flex; gap: 10px; margin-top: 20px; }
    </style>
  </head>
  <body>
    <main hidden>
      <h1>VisionEval Editor</h1>
      <p id="copy">Choose a workspace folder for scenario outputs and local app configuration. This avoids hardcoded machine paths and keeps generated files somewhere you control.</p>
      <div class="actions">
        <button id="choose">Choose Workspace</button>
        <button class="secondary" id="start">Start App</button>
      </div>
      <div id="status">Starting app...</div>
    </main>
    <script>
      const invoke = (command, args = {}) => window.__TAURI_INTERNALS__.invoke(command, args);
      const status = document.querySelector("#status");
      const choose = document.querySelector("#choose");
      const start = document.querySelector("#start");
      const setup = document.querySelector("main");

      function showSetup(message) {
        setup.hidden = false;
        status.textContent = message;
      }

      async function refreshState() {
        try {
          const state = await invoke("desktop_state");
          showSetup(state.workspaceRoot ? `Workspace: ${state.workspaceRoot}` : "Choose a workspace before starting.");
          start.disabled = !state.workspaceRoot;
        } catch (error) {
          showSetup(`Could not read setup: ${error}`);
          start.disabled = true;
        }
      }

      async function startApp() {
        start.disabled = true;
        status.textContent = "Starting local backend...";
        try {
          const url = await invoke("start_backend");
          status.textContent = "Opening app...";
          window.location.replace(url);
        } catch (error) {
          showSetup(`Could not start app: ${error}`);
          start.disabled = false;
        }
      }

      async function autoStart() {
        try {
          const state = await invoke("desktop_state");
          if (!state.workspaceRoot) {
            showSetup("Choose a workspace before starting.");
            start.disabled = true;
            return;
          }
          await startApp();
        } catch (error) {
          showSetup(`Could not start app: ${error}`);
          start.disabled = false;
        }
      }

      choose.addEventListener("click", async () => {
        status.textContent = "Opening folder chooser...";
        try {
          const root = await invoke("choose_workspace");
          if (root) await refreshState();
          else await refreshState();
        } catch (error) {
          status.textContent = `Could not choose workspace: ${error}`;
        }
      });
      start.addEventListener("click", startApp);

      autoStart();
    </script>
  </body>
</html>
